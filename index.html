<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v4.3 - Color Matching System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ALPHA <span class="version">v4.3</span></h1>
            <div class="actions">
                <button class="btn btn-sec" onclick="exportarProyecto()">Exportar .alpha</button>
                <input type="file" id="fileInput" hidden onchange="importarProyecto(event)">
                <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar Proyecto</button>
                <button class="btn btn-danger" onclick="nuevoProyecto()">Nuevo Proyecto</button>
            </div>
        </div>

        <div class="project-config" style="margin-bottom: 20px;">
            <input type="text" id="projName" placeholder="Nombre del Proyecto / Orden de Trabajo (OT)" 
                   style="background:transparent; border:none; border-bottom:1px solid #333; color:#40e0d0; font-size:1.2em; width:100%; outline:none; padding:10px 0;">
        </div>

        <div class="grid-main">
            
            <div class="card">
                <h3>1. Referencia (LAB Objetivo)</h3>
                <div class="input-row">
                    <input type="number" id="r1L" placeholder="L1" step="0.01">
                    <input type="number" id="r1a" placeholder="a1" step="0.01">
                    <input type="number" id="r1b" placeholder="b1" step="0.01">
                </div>
        
            </div>

            <div class="card">
                <h3>2. Muestra Actual (LAB)</h3>
                <input type="text" id="mName" placeholder="Nombre del Color / ID Muestra">
                <div class="input-row">
                    <input type="number" id="mL" placeholder="L" step="0.01">
                    <input type="number" id="ma" placeholder="a" step="0.01">
                    <input type="number" id="mb" placeholder="b" step="0.01">
                </div>
            </div>

            <div class="card">
                <h3>3. CMYK (%)</h3>
                <div class="input-grid">
                    <input type="number" id="cC" placeholder="C">
                    <input type="number" id="cM" placeholder="M">
                    <input type="number" id="cY" placeholder="Y">
                    <input type="number" id="cK" placeholder="K">
                </div>
                <div class="action-buttons" style="display: flex; gap: 8px; margin-top: 5px;">
                    <button class="btn btn-main" id="btnProcesar" onclick="procesar()" style="flex: 2;">CALCULAR</button>
                    <button class="btn btn-sec" onclick="limpiarCamposNuevo()" style="flex: 1; background: #333;">NUEVO</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">Hora</th>
                        <th style="width: 25%;">Color / CMYK</th>
                        <th style="width: 10%;">ΔE</th>
                        <th style="width: 40%;">Tendencia y Ajustes Sugeridos</th>
                        <th style="width: 15%;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
