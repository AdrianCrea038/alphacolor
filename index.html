<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v4.2 - Professional Colorist Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ALPHA <span class="version">v4.2</span></h1>
            <div class="actions">
                <button class="btn btn-sec" onclick="exportarProyecto()">Exportar .alpha</button>
                <input type="file" id="fileInput" hidden onchange="importarProyecto(event)">
                <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar</button>
                <button class="btn btn-danger" onclick="nuevoProyecto()">Nuevo Proyecto</button>
            </div>
        </div>

        <div class="project-config">
            <input type="text" id="projName" placeholder="Nombre del Proyecto / Orden de Trabajo (OT)">
        </div>

        <div class="grid-main">
            <div class="card">
                <h3>1. Referencia (LAB Objetivo)</h3>
                <div class="input-row">
                    <input type="number" id="r1L" placeholder="L1" step="0.01">
                    <input type="number" id="r1a" placeholder="a1" step="0.01">
                    <input type="number" id="r1b" placeholder="b1" step="0.01">
                </div>
                <div class="input-row">
                    <input type="number" id="r2L" placeholder="L2 (Opc)" step="0.01">
                    <input type="number" id="r2a" placeholder="a2" step="0.01">
                    <input type="number" id="r2b" placeholder="b2" step="0.01">
                </div>
            </div>

            <div class="card">
                <h3>2. Muestra Actual (LAB)</h3>
                <input type="text" id="mName" placeholder="Nombre del Color / ID">
                <div class="input-row">
                    <input type="number" id="mL" placeholder="L" step="0.01">
                    <input type="number" id="ma" placeholder="a" step="0.01">
                    <input type="number" id="mb" placeholder="b" step="0.01">
                </div>
            </div>

            <div class="card">
                <h3>3. CMYK (%)</h3>
                <div class="input-grid">
                    <input type="number" id="cC" placeholder="C">
                    <input type="number" id="cM" placeholder="M">
                    <input type="number" id="cY" placeholder="Y">
                    <input type="number" id="cK" placeholder="K">
                </div>
                <div class="action-buttons">
                    <button class="btn btn-main" id="btnProcesar" onclick="procesar()">CALCULAR</button>
                    <button class="btn btn-sec" onclick="limpiarCamposNuevo()" title="Limpia muestra y CMYK, mantiene referencia">NUEVO COLOR</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Color / CMYK</th>
                        <th>ΔE</th>
                        <th>Tendencia y Ajustes Sugeridos</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
