<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v2.7 - Decision Tracking</title>
    <style>
        :root {
            --bg-page: #0f111a;
            --bg-card: #1a1d29;
            --accent: #40e0d0;
            --coral: #ff6b81;
            --orange: #ffb74d;
            --text: #ced4da;
            --success: #51cf66;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px; }
        
        .project-config { background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #343a40; display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px; }
        .input-group label { display: block; font-size: 0.65em; letter-spacing: 1px; margin-bottom: 5px; color: var(--accent); text-transform: uppercase; }
        
        .grid-main { display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #343a40; position: relative; }
        .card h3 { color: var(--accent); font-size: 0.8em; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #343a40; padding-bottom: 5px; margin-bottom: 10px; }
        
        input { width: 100%; background: #0f111a; border: 1px solid #343a40; color: white; padding: 10px; border-radius: 5px; margin-bottom: 8px; box-sizing: border-box; }
        
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7em; }
        .btn-main { background: linear-gradient(135deg, var(--coral), var(--orange)); color: #000; width: 100%; font-size: 1.1em; margin-top: 10px; padding: 12px; }
        .btn-sec { background: #343a40; color: white; border: 1px solid #495057; }
        .btn-danger { background: transparent; color: var(--coral); border: 1px solid var(--coral); margin-left: 5px; }
        
        .table-container { background: var(--bg-card); border-radius: 12px; overflow: hidden; margin-top: 30px; border: 1px solid #343a40; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #252a3d; color: var(--accent); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #343a40; vertical-align: middle; }
        
        .badge-de { background: #000; padding: 4px 10px; border-radius: 6px; font-weight: bold; border: 1px solid #333; }
        .ruta-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; margin-top: 8px; border-left: 4px solid var(--orange); }
        .ruta-label { color: var(--orange); font-weight: bold; font-size: 0.75em; display: block; margin-bottom: 4px; text-transform: uppercase; }
        
        /* Estilos Check Point */
        .check-point { cursor: pointer; display: block; padding: 4px; border-radius: 4px; transition: 0.2s; border: 1px solid transparent; margin-bottom: 2px; }
        .check-point:hover { background: rgba(64, 224, 208, 0.1); border-color: var(--accent); }
        .selected-route { background: rgba(81, 207, 102, 0.2) !important; border-color: var(--success) !important; color: var(--success); }
        .selected-route::before { content: "✓ "; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ALPHA <span style="font-weight: 200; font-size: 0.5em;">v2.7 Decision Logger</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sec" onclick="exportarProyecto()">Exportar .alpha</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarProyecto(event)">
            <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar Proyecto</button>
            <button class="btn btn-sec" onclick="guardarBorrador()">Borrador</button>
        </div>
    </div>

    <div class="project-config">
        <div class="input-group">
            <label>Nombre del Proyecto / OT</label>
            <input type="text" id="projName" placeholder="Identificación del trabajo...">
        </div>
        <div class="input-group">
            <label>Blanco de Tela</label>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="clothL" placeholder="L*">
                <input type="number" id="clothA" placeholder="a*">
                <input type="number" id="clothB" placeholder="b*">
            </div>
        </div>
    </div>

    <div class="grid-main">
        <div class="card">
            <h3>1. Referencia (Doble)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="r1L" placeholder="L1" step="0.01">
                <input type="number" id="r1a" placeholder="a1" step="0.01">
                <input type="number" id="r1b" placeholder="b1" step="0.01">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="r2L" placeholder="L2" step="0.01">
                <input type="number" id="r2a" placeholder="a2" step="0.01">
                <input type="number" id="r2b" placeholder="b2" step="0.01">
            </div>
        </div>

        <div class="card">
            <h3 id="tituloMuestra">2. Muestra actual</h3>
            <input type="text" id="mName" placeholder="Nombre del Color">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="mL" placeholder="L*" step="0.01">
                <input type="number" id="ma" placeholder="a*" step="0.01">
                <input type="number" id="mb" placeholder="b*" step="0.01">
            </div>
        </div>

        <div class="card">
            <h3>3. CMYK Actual (%)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="number" id="curC" placeholder="C">
                <input type="number" id="curM" placeholder="M">
                <input type="number" id="curY" placeholder="Y">
                <input type="number" id="curK" placeholder="K">
            </div>
            <button class="btn btn-main" onclick="procesar()">CALCULAR E HISTORIAR</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Color</th>
                    <th>Estándar</th>
                    <th>Muestra</th>
                    <th>ΔE</th>
                    <th>Ajuste & Check Points</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let proyecto = { nombre: "", tela: {L:0,a:0,b:0}, colores: [] };
    let editandoId = null;

    function procesar() {
        const r1L = parseFloat(document.getElementById('r1L').value);
        const mL = parseFloat(document.getElementById('mL').value);
        if (isNaN(r1L) || isNaN(mL)) return alert("Datos LAB incompletos.");

        const refProm = {
            L: (r1L + (parseFloat(document.getElementById('r2L').value) || r1L)) / 2,
            a: (parseFloat(document.getElementById('r1a').value) + (parseFloat(document.getElementById('r2a').value) || parseFloat(document.getElementById('r1a').value))) / 2,
            b: (parseFloat(document.getElementById('r1b').value) + (parseFloat(document.getElementById('r2b').value) || parseFloat(document.getElementById('r1b').value))) / 2
        };

        const ma = parseFloat(document.getElementById('ma').value) || 0;
        const mb = parseFloat(document.getElementById('mb').value) || 0;
        const curC = parseFloat(document.getElementById('curC').value) || 0;
        const curM = parseFloat(document.getElementById('curM').value) || 0;
        const curY = parseFloat(document.getElementById('curY').value) || 0;
        const curK = parseFloat(document.getElementById('curK').value) || 0;

        const dL = mL - refProm.L;
        const da = ma - refProm.a;
        const db = mb - refProm.b;
        const dE = Math.sqrt(dL*dL + da*da + db*db).toFixed(2);

        let adjC = (dL * 0.4).toFixed(1);
        let adjM = (da * -1.6).toFixed(1);
        let adjY = (db * -1.6).toFixed(1);
        let adjK = (dL * 1.3).toFixed(1);

        let colisiones = [];
        if ((curC + parseFloat(adjC)) >= 100) colisiones.push("C");
        if ((curM + parseFloat(adjM)) >= 100) colisiones.push("M");
        if ((curY + parseFloat(adjY)) >= 100) colisiones.push("Y");
        if ((curK + parseFloat(adjK)) >= 100) colisiones.push("K");

        const colorId = editandoId || Date.now();
        const nuevoColor = {
            id: colorId,
            nombre: document.getElementById('mName').value || "Color",
            referencia: refProm,
            muestra: { L: mL, a: ma, b: mb },
            delta: dE,
            ajusteBase: `C:${adjC} M:${adjM} Y:${adjY} K:${adjK}`,
            colisiones: colisiones,
            rutaSeleccionada: null // Aquí se guarda el Check Point
        };

        if (editandoId) {
            const idx = proyecto.colores.findIndex(c => c.id === editandoId);
            proyecto.colores[idx] = nuevoColor;
            editandoId = null;
        } else {
            proyecto.colores.push(nuevoColor);
        }

        render();
        limpiar();
    }

    // FUNCIÓN DE CHECK POINT: Guarda qué ruta eligió el usuario
    function marcarRuta(colorId, indiceRuta) {
        const color = proyecto.colores.find(c => c.id === colorId);
        color.rutaSeleccionada = indiceRuta;
        render();
        guardarBorrador(); // Guarda automáticamente al elegir
    }

    function render() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = proyecto.colores.map((c, index) => {
            // Compatibilidad con versiones viejas (si ajusteFull existe, usarlo)
            let ajusteContenido = c.ajusteFull || `<span style="color:var(--accent); font-weight:bold">${c.ajusteBase}</span>`;
            
            if (c.colisiones && c.colisiones.length > 0) {
                let rutas = [];
                if (c.colisiones.includes("Y")) {
                    rutas = ["Sube M +1.5% | Sube K +0.8%", "Sube C +1.2% | Sube K +0.5%"];
                } else if (c.colisiones.includes("M")) {
                    rutas = ["Sube C +1.5% | Sube K +1.0%", "Sube Y +2.0% | Sube K +0.5%"];
                } else if (c.colisiones.includes("C")) {
                    rutas = ["Sube K +1.8% | Sube M +0.8%", "Sube Y +1.0% | Sube K +0.6%"];
                } else {
                    rutas = ["Subir canales secundarios +1.2%"];
                }

                ajusteContenido += `<div class="ruta-box"><span class="ruta-label">TOPE: ${c.colisiones.join('+')}</span>`;
                rutas.forEach((r, idx) => {
                    const selClass = c.rutaSeleccionada === idx ? 'selected-route' : '';
                    ajusteContenido += `<span class="check-point ${selClass}" onclick="marcarRuta(${c.id}, ${idx})">${r}</span>`;
                });
                ajusteContenido += `</div>`;
            }

            return `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${c.nombre}</strong></td>
                    <td>L:${c.referencia.L.toFixed(1)}</td>
                    <td>L:${c.muestra.L.toFixed(1)}</td>
                    <td><span class="badge-de" style="color:${c.delta < 1 ? 'var(--success)' : 'var(--coral)'}">${c.delta}</span></td>
                    <td>${ajusteContenido}</td>
                    <td>
                        <button class="btn btn-sec" onclick="prepararReval(${c.id})">REV</button>
                        <button class="btn btn-danger" onclick="eliminarColor(${c.id})">✕</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function prepararReval(id) {
        editandoId = id;
        const col = proyecto.colores.find(c => c.id === id);
        document.getElementById('r1L').value = col.referencia.L;
        document.getElementById('r1a').value = col.referencia.a;
        document.getElementById('r1b').value = col.referencia.b;
        document.getElementById('mName').value = col.nombre;
        window.scrollTo(0,0);
    }

    function eliminarColor(id) {
        proyecto.colores = proyecto.colores.filter(c => c.id !== id);
        render();
    }

    function limpiar() {
        ['r1L','r1a','r1b','r2L','r2a','r2b','mName','mL','ma','mb','curC','curM','curY','curK'].forEach(i => document.getElementById(i).value="");
    }

    function exportarProyecto() {
        proyecto.nombre = document.getElementById('projName').value || "Alpha_Project";
        proyecto.tela = { L: document.getElementById('clothL').value, a: document.getElementById('clothA').value, b: document.getElementById('clothB').value };
        const blob = new Blob([JSON.stringify(proyecto)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = proyecto.nombre + ".alpha";
        a.click();
    }

    function importarProyecto(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                proyecto = JSON.parse(ev.target.result);
                document.getElementById('projName').value = proyecto.nombre || "";
                if(proyecto.tela) {
                    document.getElementById('clothL').value = proyecto.tela.L;
                    document.getElementById('clothA').value = proyecto.tela.a;
                    document.getElementById('clothB').value = proyecto.tela.b;
                }
                render();
            } catch(err) { alert("Error al cargar el archivo."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function guardarBorrador() {
        localStorage.setItem('alpha_v27_save', JSON.stringify(proyecto));
    }

    window.onload = () => {
        const d = localStorage.getItem('alpha_v27_save');
        if(d) { proyecto = JSON.parse(d); render(); }
    };
</script>
</body>
</html>
