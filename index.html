<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v3.0 - Comparative Logic</title>
    <style>
        :root {
            --bg-page: #0f111a;
            --bg-card: #1a1d29;
            --accent: #40e0d0;
            --coral: #ff6b81;
            --orange: #ffb74d;
            --text: #ced4da;
            --success: #51cf66;
            --blue: #4dabf7;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px; }
        
        .project-config { background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #343a40; display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px; }
        .input-group label { display: block; font-size: 0.65em; letter-spacing: 1px; margin-bottom: 5px; color: var(--accent); text-transform: uppercase; }
        
        .grid-main { display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #343a40; }
        .card h3 { color: var(--accent); font-size: 0.8em; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #343a40; padding-bottom: 5px; margin-bottom: 10px; }
        
        input, textarea { width: 100%; background: #0f111a; border: 1px solid #343a40; color: white; padding: 10px; border-radius: 5px; margin-bottom: 8px; box-sizing: border-box; font-family: inherit; }
        
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7em; }
        .btn-main { background: linear-gradient(135deg, var(--coral), var(--orange)); color: #000; width: 100%; font-size: 1.1em; margin-top: 10px; padding: 12px; }
        .btn-sec { background: #343a40; color: white; border: 1px solid #495057; }
        .btn-danger { background: transparent; color: var(--coral); border: 1px solid var(--coral); }
        .btn-rev { background: var(--blue); color: #000; margin-right: 5px; }

        .table-container { background: var(--bg-card); border-radius: 12px; overflow: hidden; margin-top: 30px; border: 1px solid #343a40; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        th { background: #252a3d; color: var(--accent); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #343a40; vertical-align: top; }
        
        .badge-de { background: #000; padding: 4px 8px; border-radius: 6px; font-weight: bold; border: 1px solid #333; }
        
        /* Comparativa de CMYK */
        .diff-tag { font-size: 0.85em; display: inline-block; padding: 2px 5px; border-radius: 4px; margin-top: 4px; font-weight: bold; }
        .diff-plus { background: rgba(81, 207, 102, 0.2); color: var(--success); }
        .diff-minus { background: rgba(255, 107, 129, 0.2); color: var(--coral); }
        
        .ruta-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #444; }
        .check-point { display: block; padding: 8px; border-radius: 6px; margin-bottom: 5px; border: 1px solid #444; cursor: pointer; }
        .check-point.selected { border-color: var(--success); background: rgba(81, 207, 102, 0.1); color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ALPHA <span style="font-weight: 200; font-size: 0.5em;">v3.0 Comparative Tracker</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sec" onclick="exportarProyecto()">Exportar .alpha</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarProyecto(event)">
            <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar Proyecto</button>
        </div>
    </div>

    <div class="project-config">
        <div class="input-group">
            <label>Nombre del Proyecto</label>
            <input type="text" id="projName" placeholder="Identificación...">
        </div>
        <div class="input-group">
            <label>Notas del Lote</label>
            <textarea id="projNotes" rows="1" placeholder="Ej: Tela Poliéster 100%, presión alta..."></textarea>
        </div>
    </div>

    <div class="grid-main">
        <div class="card">
            <h3>1. Referencia (Objetivo)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="rL" placeholder="L" step="0.01">
                <input type="number" id="ra" placeholder="a" step="0.01">
                <input type="number" id="rb" placeholder="b" step="0.01">
            </div>
        </div>
        <div class="card">
            <h3>2. Muestra (Actual)</h3>
            <input type="text" id="mName" placeholder="Nombre del Color">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="mL" placeholder="L" step="0.01">
                <input type="number" id="ma" placeholder="a" step="0.01">
                <input type="number" id="mb" placeholder="b" step="0.01">
            </div>
        </div>
        <div class="card">
            <h3>3. CMYK Actual (%)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="number" id="cC" placeholder="C">
                <input type="number" id="cM" placeholder="M">
                <input type="number" id="cY" placeholder="Y">
                <input type="number" id="cK" placeholder="K">
            </div>
            <button class="btn btn-main" id="btnProcesar" onclick="procesar()">CALCULAR E HISTORIAR</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha / Estado</th>
                    <th>Color / CMYK Actual</th>
                    <th>Cambio vs Anterior</th>
                    <th>ΔE</th>
                    <th>Rutas & Decisiones</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let proyecto = { nombre: "", notas: "", colores: [] };
    let cmykAnterior = null; // Memoria temporal para comparar
    let editandoId = null;

    function procesar() {
        const rL = parseFloat(document.getElementById('rL').value);
        const ra = parseFloat(document.getElementById('ra').value);
        const rb = parseFloat(document.getElementById('rb').value);
        const mL = parseFloat(document.getElementById('mL').value);
        const ma = parseFloat(document.getElementById('ma').value);
        const mb = parseFloat(document.getElementById('mb').value);
        
        if (isNaN(rL) || isNaN(mL)) return alert("Datos LAB incompletos.");

        const dE = Math.sqrt(Math.pow(mL-rL,2) + Math.pow(ma-ra,2) + Math.pow(mb-rb,2)).toFixed(2);
        
        const curC = parseFloat(document.getElementById('cC').value) || 0;
        const curM = parseFloat(document.getElementById('cM').value) || 0;
        const curY = parseFloat(document.getElementById('cY').value) || 0;
        const curK = parseFloat(document.getElementById('cK').value) || 0;

        // Lógica de Comparación
        let comparativa = "";
        if (cmykAnterior) {
            const diff = (val, ant) => {
                let d = (val - ant).toFixed(1);
                if (d == 0) return "";
                return d > 0 ? `<span class="diff-tag diff-plus">+${d}%</span>` : `<span class="diff-tag diff-minus">${d}%</span>`;
            };
            comparativa = `C:${diff(curC, cmykAnterior.curC)} M:${diff(curM, cmykAnterior.curM)} Y:${diff(curY, cmykAnterior.curY)} K:${diff(curK, cmykAnterior.curK)}`;
        }

        const colorData = {
            id: editandoId || Date.now(),
            nombre: document.getElementById('mName').value || "Color",
            lab: { rL, ra, rb, mL, ma, mb },
            de: dE,
            cmyk: { curC, curM, curY, curK },
            cambioTexto: comparativa || "Primer Registro",
            rutaElegida: null
        };

        if (editandoId) {
            const idx = proyecto.colores.findIndex(c => c.id === editandoId);
            proyecto.colores[idx] = colorData;
            editandoId = null;
            document.getElementById('btnProcesar').innerText = "CALCULAR E HISTORIAR";
        } else {
            proyecto.colores.unshift(colorData);
        }

        cmykAnterior = null; // Reset de memoria
        render();
        limpiar();
    }

    function revalidar(id) {
        editandoId = id;
        const c = proyecto.colores.find(col => col.id === id);
        
        // Guardamos el CMYK actual como "anterior" antes de cargar los campos
        cmykAnterior = { ...c.cmyk };

        document.getElementById('rL').value = c.lab.rL;
        document.getElementById('ra').value = c.lab.ra;
        document.getElementById('rb').value = c.lab.rb;
        document.getElementById('mName').value = c.nombre;
        document.getElementById('cC').value = c.cmyk.curC;
        document.getElementById('cM').value = c.cmyk.curM;
        document.getElementById('cY').value = c.cmyk.curY;
        document.getElementById('cK').value = c.cmyk.curK;
        
        document.getElementById('btnProcesar').innerText = "ACTUALIZAR Y COMPARAR";
        window.scrollTo(0,0);
    }

    function render() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = proyecto.colores.map(c => `
            <tr>
                <td><small>${new Date(c.id).toLocaleString()}</small></td>
                <td><strong>${c.nombre}</strong><br><small>Final: C:${c.cmyk.curC} M:${c.cmyk.curM} Y:${c.cmyk.curY} K:${c.cmyk.curK}</small></td>
                <td>${c.cambioTexto}</td>
                <td><span class="badge-de" style="color:${c.de > 1 ? 'var(--coral)' : 'var(--success)'}">${c.de}</span></td>
                <td>
                    ${(c.cmyk.curC >= 98 || c.cmyk.curM >= 98 || c.cmyk.curY >= 98) ? 
                    '<div class="ruta-box"><small style="color:var(--orange)">⚠️ CANAL AL LÍMITE</small></div>' : 
                    '<small style="color:var(--text)">Balance OK</small>'}
                </td>
                <td>
                    <button class="btn btn-rev" onclick="revalidar(${c.id})">REV</button>
                    <button class="btn btn-danger" onclick="eliminar(${c.id})">✕</button>
                </td>
            </tr>
        `).join('');
    }

    function eliminar(id) {
        proyecto.colores = proyecto.colores.filter(c => c.id !== id);
        render();
    }

    function limpiar() {
        ['mName','mL','ma','mb','cC','cM','cY','cK'].forEach(id => document.getElementById(id).value = "");
    }

    function exportarProyecto() {
        proyecto.nombre = document.getElementById('projName').value || "Alpha_v3";
        proyecto.notas = document.getElementById('projNotes').value;
        const blob = new Blob([JSON.stringify(proyecto)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = proyecto.nombre + ".alpha";
        a.click();
    }

    function importarProyecto(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                proyecto = data;
                document.getElementById('projName').value = proyecto.nombre || "";
                document.getElementById('projNotes').value = proyecto.notas || "";
                render();
            } catch(e) { alert("Error al cargar."); }
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
