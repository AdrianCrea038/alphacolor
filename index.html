<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v2.2 - Multi-Standard Suite</title>
    <style>
        :root {
            --bg-page: #0f111a;
            --bg-card: #1a1d29;
            --accent: #40e0d0;
            --coral: #ff6b81;
            --orange: #ffb74d;
            --text: #ced4da;
            --success: #51cf66;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header y Meta */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px; }
        .project-meta { background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #343a40; display: flex; align-items: center; gap: 20px; }
        .project-meta div { flex: 1; }
        
        /* Grid de Trabajo */
        .grid-main { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #343a40; transition: 0.3s; }
        .card h3 { color: var(--accent); font-size: 0.8em; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #343a40; padding-bottom: 5px; margin-bottom: 10px; }
        
        input { width: 100%; background: #0f111a; border: 1px solid #343a40; color: white; padding: 10px; border-radius: 5px; margin-bottom: 8px; box-sizing: border-box; font-size: 0.9em; }
        input:focus { border-color: var(--accent); outline: none; }
        
        /* Botones */
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main { background: linear-gradient(135deg, var(--coral), var(--orange)); color: #000; width: 100%; font-size: 1.1em; margin-top: 10px; }
        .btn-revalidate { background: transparent; color: var(--orange); border: 1px solid var(--orange); font-size: 0.7em; padding: 6px 12px; }
        .btn-revalidate:hover { background: var(--orange); color: #000; }
        .btn-sec { background: #343a40; color: white; font-size: 0.8em; border: 1px solid #495057; }
        .btn-sec:hover { background: #495057; }
        
        /* Tabla */
        .table-container { background: var(--bg-card); border-radius: 12px; overflow: hidden; margin-top: 30px; border: 1px solid #343a40; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #252a3d; color: var(--accent); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #343a40; vertical-align: middle; }
        
        .delta-badge { background: #000; padding: 4px 10px; border-radius: 6px; font-weight: bold; border: 1px solid #333; }
        .revalidando-ui { border: 2px solid var(--orange) !important; background: #2d241a !important; box-shadow: 0 0 15px rgba(255, 183, 77, 0.2); }
        .log-evolucion { font-size: 0.7em; color: #666; display: block; margin-top: 4px; }
        
        .alerta-tecnica { color: var(--orange); font-size: 0.8em; margin-top: 5px; padding: 5px; border-left: 2px solid var(--orange); background: rgba(255,183,77,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ALPHA <span style="font-weight: 200; font-size: 0.5em;">v2.2 Project Suite</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sec" onclick="exportarProyecto()">Descargar .alpha</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarProyecto(event)">
            <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar Proyecto</button>
            <button class="btn btn-sec" onclick="guardarBorrador()">Guardar Borrador</button>
        </div>
    </div>

    <div class="project-meta">
        <div>
            <label style="font-size: 0.7em; opacity: 0.7;">NOMBRE DEL PROYECTO / ORDEN DE TRABAJO</label>
            <input type="text" id="projName" placeholder="Ej: Producción Marzo - Cliente XYZ">
        </div>
    </div>

    <div class="grid-main">
        <div class="card" id="cardRef">
            <h3>1. Estándar de Referencia</h3>
            <p style="font-size: 0.65em; margin-bottom: 10px; color: #888;">Ingresa el objetivo para este color:</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <input type="number" id="rL" placeholder="L*" step="0.01">
                <input type="number" id="ra" placeholder="a*" step="0.01">
                <input type="number" id="rb" placeholder="b*" step="0.01">
            </div>
            <p style="font-size: 0.6em; color: #555; margin-top: 5px;">* Si usas doble medida, promedia los valores manualmente.</p>
        </div>

        <div class="card" id="cardMuestra">
            <h3 id="tituloMuestra">2. Muestra actual</h3>
            <input type="text" id="mName" placeholder="Nombre del Color">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <input type="number" id="mL" placeholder="L*" step="0.01">
                <input type="number" id="ma" placeholder="a*" step="0.01">
                <input type="number" id="mb" placeholder="b*" step="0.01">
            </div>
        </div>

        <div class="card" id="cardCMYK">
            <h3>3. CMYK en Máquina (%)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <input type="number" id="curC" placeholder="C">
                <input type="number" id="curM" placeholder="M">
                <input type="number" id="curY" placeholder="Y">
                <input type="number" id="curK" placeholder="K">
            </div>
            <button class="btn btn-main" id="btnAccion" onclick="procesar()">AGREGAR COLOR</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Color / Historial</th>
                    <th>Referencia</th>
                    <th>Última Medición</th>
                    <th>ΔE</th>
                    <th>Ajuste Sugerido</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let proyecto = { nombre: "", colores: [] };
    let idEditando = null;

    function procesar() {
        const rL = parseFloat(document.getElementById('rL').value);
        const mL = parseFloat(document.getElementById('mL').value);
        if (isNaN(rL) || isNaN(mL)) return alert("Por favor, ingresa los valores LAB de Referencia y Muestra.");

        const ra = parseFloat(document.getElementById('ra').value) || 0;
        const rb = parseFloat(document.getElementById('rb').value) || 0;
        const ma = parseFloat(document.getElementById('ma').value) || 0;
        const mb = parseFloat(document.getElementById('mb').value) || 0;
        
        const C = parseFloat(document.getElementById('curC').value) || 0;
        const M = parseFloat(document.getElementById('curM').value) || 0;
        const Y = parseFloat(document.getElementById('curY').value) || 0;
        const K = parseFloat(document.getElementById('curK').value) || 0;

        const dL = mL - rL;
        const da = ma - ra;
        const db = mb - rb;
        const dE = Math.sqrt(dL*dL + da*da + db*db).toFixed(2);

        // Lógica de ajuste
        let adjC = (dL * 0.4).toFixed(1);
        let adjM = (da * -1.6).toFixed(1);
        let adjY = (db * -1.6).toFixed(1);
        let adjK = (dL * 1.3).toFixed(1);

        let mensajeAlerta = "";
        // Alerta Negro al 100%
        if((K + parseFloat(adjK)) >= 100 && dL > 0) {
            mensajeAlerta = "K al 100%: Sube C, M, Y +1.5% para oscurecer.";
        }
        // Alerta Magenta al 100%
        if((M + parseFloat(adjM)) >= 100 && da < 0) {
            mensajeAlerta = db < 0 ? "M al 100%: Baja C -2.5% y sube K +1.0%" : "M al 100%: Baja Y -2.0% y C -1.0%";
        }

        if (idEditando !== null) {
            // Actualizar color existente
            let color = proyecto.colores.find(c => c.id === idEditando);
            color.historial.push({ dE: dE, cmyk: `C:${C} M:${M} Y:${Y} K:${K}` });
            color.ultimaMedicion = { L: mL, a: ma, b: mb };
            color.deltaActual = dE;
            color.ajusteSugerido = `C:${adjC} M:${adjM} Y:${adjY} K:${adjK}`;
            color.alertaTecnica = mensajeAlerta;
            
            idEditando = null;
            document.getElementById('btnAccion').innerText = "AGREGAR COLOR";
            document.getElementById('tituloMuestra').innerText = "2. Muestra actual";
            document.getElementById('cardMuestra').classList.remove('revalidando-ui');
        } else {
            // Nuevo color
            proyecto.colores.push({
                id: proyecto.colores.length + 1,
                nombre: document.getElementById('mName').value || "Color " + (proyecto.colores.length + 1),
                referencia: { L: rL, a: ra, b: rb },
                ultimaMedicion: { L: mL, a: ma, b: mb },
                deltaActual: dE,
                ajusteSugerido: `C:${adjC} M:${adjM} Y:${adjY} K:${adjK}`,
                alertaTecnica: mensajeAlerta,
                historial: [{ dE: dE, cmyk: `C:${C} M:${M} Y:${Y} K:${K}` }]
            });
        }

        render();
        limpiar();
    }

    function prepararValidacion(id) {
        idEditando = id;
        let color = proyecto.colores.find(c => c.id === id);
        
        // Bloquear estándar original en los inputs
        document.getElementById('rL').value = color.referencia.L;
        document.getElementById('ra').value = color.referencia.a;
        document.getElementById('rb').value = color.referencia.b;
        
        document.getElementById('mName').value = color.nombre;
        document.getElementById('tituloMuestra').innerText = "REVALIDANDO: " + color.nombre;
        document.getElementById('btnAccion').innerText = "GUARDAR CAMBIOS";
        document.getElementById('cardMuestra').classList.add('revalidando-ui');
        window.scrollTo(0,0);
    }

    function render() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = proyecto.colores.map(c => `
            <tr>
                <td>${c.id}</td>
                <td>
                    <strong>${c.nombre}</strong>
                    <span class="log-evolucion">Inició: ΔE ${c.historial[0].dE} | Ajustes: ${c.historial.length - 1}</span>
                </td>
                <td>L:${c.referencia.L} a:${c.referencia.a} b:${c.referencia.b}</td>
                <td>L:${c.ultimaMedicion.L} a:${c.ultimaMedicion.a} b:${c.ultimaMedicion.b}</td>
                <td><span class="delta-badge" style="border-color:${c.deltaActual < 1 ? 'var(--success)' : 'var(--coral)'}">${c.deltaActual}</span></td>
                <td>
                    <span style="color:var(--accent); font-weight:bold">${c.ajusteSugerido}</span>
                    ${c.alertaTecnica ? `<div class="alerta-tecnica">${c.alertaTecnica}</div>` : ''}
                </td>
                <td>
                    <button class="btn btn-revalidate" onclick="prepararValidacion(${c.id})">REVALIDAR</button>
                </td>
            </tr>
        `).join('');
    }

    function limpiar() {
        ['rL','ra','rb','mName','mL','ma','mb','curC','curM','curY','curK'].forEach(id => document.getElementById(id).value = "");
    }

    function exportarProyecto() {
        const data = JSON.stringify(proyecto);
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (document.getElementById('projName').value || "proyecto") + ".alpha";
        a.click();
    }

    function importarProyecto(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            proyecto = JSON.parse(ev.target.result);
            document.getElementById('projName').value = proyecto.nombre || "";
            render();
        };
        reader.readAsText(e.target.files[0]);
    }

    function guardarBorrador() {
        proyecto.nombre = document.getElementById('projName').value;
        localStorage.setItem('alpha_temp', JSON.stringify(proyecto));
        alert("Borrador guardado.");
    }

    window.onload = () => {
        const b = localStorage.getItem('alpha_temp');
        if(b) { proyecto = JSON.parse(b); document.getElementById('projName').value = proyecto.nombre; render(); }
    };
</script>
</body>
</html>
