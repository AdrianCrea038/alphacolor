<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v2.0 - Project Manager</title>
    <style>
        :root {
            --bg-page: #0f111a;
            --bg-card: #1a1d29;
            --accent: #40e0d0;
            --coral: #ff6b81;
            --orange: #ffb74d;
            --text: #ced4da;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Header & Project Info */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px; }
        .project-meta { background: var(--bg-card); padding: 15px; border-radius: 10px; display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
        
        /* Input Sections */
        .grid-main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #343a40; }
        .card h3 { color: var(--accent); font-size: 0.8em; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #343a40; padding-bottom: 5px; }
        
        input { width: 100%; background: #0f111a; border: 1px solid #343a40; color: white; padding: 8px; border-radius: 5px; margin-bottom: 8px; box-sizing: border-box; }
        
        /* Buttons */
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: linear-gradient(135deg, var(--coral), var(--orange)); color: #000; width: 100%; font-size: 1.1em; }
        .btn-sec { background: #495057; color: white; }
        .btn-save { background: var(--accent); color: #000; }
        
        /* Table Style */
        .table-container { background: var(--bg-card); border-radius: 12px; overflow: hidden; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #252a3d; color: var(--accent); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #343a40; vertical-align: top; }
        
        .badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8em; }
        .alert-box { color: var(--orange); font-size: 0.8em; margin-top: 5px; border-left: 2px solid var(--orange); padding-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ALPHA <span style="font-weight: 200; font-size: 0.5em;">v2.0 Project Suite</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sec" onclick="exportarProyecto()">Descargar .alpha</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarProyecto(event)">
            <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar Proyecto</button>
            <button class="btn btn-save" onclick="guardarBorrador()">Guardar Borrador</button>
        </div>
    </div>

    <div class="project-meta">
        <div style="flex: 1;">
            <label>Nombre del Proyecto:</label>
            <input type="text" id="projName" placeholder="Ej: Temporada Verano 2026 - Cliente X">
        </div>
        <div style="flex: 1;">
            <label>Blanco de Tela (Opcional):</label>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="baseL" placeholder="L*">
                <input type="number" id="baseA" placeholder="a*">
                <input type="number" id="baseB" placeholder="b*">
            </div>
        </div>
    </div>

    <div class="grid-main">
        <div class="card">
            <h3>1. Referencia (Doble Medida)</h3>
            <p style="font-size: 0.7em; opacity: 0.7;">Mide dos veces para promediar:</p>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="r1L" placeholder="L1">
                <input type="number" id="r1a" placeholder="a1">
                <input type="number" id="r1b" placeholder="b1">
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="r2L" placeholder="L2">
                <input type="number" id="r2a" placeholder="a2">
                <input type="number" id="r2b" placeholder="b2">
            </div>
            <button class="btn btn-sec" style="width:100%; padding:5px;" onclick="calcularPromedioRef()">Fijar Estándar</button>
            <div id="refFijada" style="margin-top:10px; font-size:0.8em; color:var(--accent)"></div>
        </div>

        <div class="card">
            <h3>2. Muestra a Igualar</h3>
            <input type="text" id="colorItemName" placeholder="Nombre del Color (Ej: Rojo Vino)">
            <input type="number" id="m1L" placeholder="Lectura L*">
            <input type="number" id="m1a" placeholder="Lectura a*">
            <input type="number" id="m1b" placeholder="Lectura b*">
        </div>

        <div class="card">
            <h3>3. CMYK Actual (%)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="number" id="curC" placeholder="C">
                <input type="number" id="curM" placeholder="M">
                <input type="number" id="curY" placeholder="Y">
                <input type="number" id="curK" placeholder="K">
            </div>
            <button class="btn btn-main" onclick="procesarColor()" style="margin-top:10px;">AGREGAR AL PROYECTO</button>
        </div>
    </div>

    <div class="table-container">
        <table id="tablaProyecto">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Color</th>
                    <th>Referencia (Prom)</th>
                    <th>Muestra</th>
                    <th>CMYK Base</th>
                    <th>AJUSTE RECOMENDADO</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let proyecto = {
        nombre: "",
        colores: []
    };

    let refPromedio = null;

    function calcularPromedioRef() {
        const l1 = parseFloat(document.getElementById('r1L').value);
        const l2 = parseFloat(document.getElementById('r2L').value);
        // ... mismo para a y b
        if(isNaN(l1) || isNaN(l2)) return alert("Ingresa ambas medidas de referencia");
        
        refPromedio = {
            L: (l1 + l2) / 2,
            a: (parseFloat(document.getElementById('r1a').value) + parseFloat(document.getElementById('r2a').value)) / 2,
            b: (parseFloat(document.getElementById('r1b').value) + parseFloat(document.getElementById('r2b').value)) / 2
        };
        document.getElementById('refFijada').innerText = `Estándar fijado: L ${refPromedio.L.toFixed(2)}`;
    }

    function procesarColor() {
        if(!refPromedio) return alert("Primero fija el estándar con la doble medida");
        
        const nombre = document.getElementById('colorItemName').value || "Sin nombre";
        const mL = parseFloat(document.getElementById('m1L').value);
        const ma = parseFloat(document.getElementById('m1a').value);
        const mb = parseFloat(document.getElementById('m1b').value);
        
        const c = parseFloat(document.getElementById('curC').value) || 0;
        const m = parseFloat(document.getElementById('curM').value) || 0;
        const y = parseFloat(document.getElementById('curY').value) || 0;
        const k = parseFloat(document.getElementById('curK').value) || 0;

        const dL = mL - refPromedio.L;
        const da = ma - refPromedio.a;
        const db = mb - refPromedio.b;
        const dE = Math.sqrt(dL*dL + da*da + db*db).toFixed(2);

        // Lógica de ajuste básica
        let adjC = (dL * 0.4).toFixed(1);
        let adjM = (da * -1.6).toFixed(1);
        let adjY = (db * -1.6).toFixed(1);
        let adjK = (dL * 1.3).toFixed(1);

        // Chequeo de colisión 100%
        let rutasEspeciales = "";
        if((m + parseFloat(adjM)) >= 100) {
            rutasEspeciales = db < 0 ? 
                "<div class='alert-box'>M al 100%: Baja C: -2.5% y sube K: +1.5%</div>" : 
                "<div class='alert-box'>M al 100%: Baja Y: -2.0% y C: -1.0%</div>";
        }

        const nuevoItem = {
            id: proyecto.colores.length + 1,
            nombre,
            ref: `${refPromedio.L.toFixed(1)}, ${refPromedio.a.toFixed(1)}, ${refPromedio.b.toFixed(1)}`,
            muestra: `${mL.toFixed(1)}, ${ma.toFixed(1)}, ${mb.toFixed(1)}`,
            cmyk: `C:${c} M:${m} Y:${y} K:${k}`,
            ajuste: `C:${adjC} M:${adjM} Y:${adjY} K:${adjK}`,
            extra: rutasEspeciales,
            dE: dE
        };

        proyecto.colores.push(nuevoItem);
        renderTabla();
        
        // Limpiar campos de muestra para el siguiente
        document.getElementById('colorItemName').value = "";
        document.getElementById('m1L').value = "";
        document.getElementById('m1a').value = "";
        document.getElementById('m1b').value = "";
    }

    function renderTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = proyecto.colores.map(c => `
            <tr>
                <td>${c.id}</td>
                <td><strong>${c.nombre}</strong><br><small>ΔE: ${c.dE}</small></td>
                <td>${c.ref}</td>
                <td>${c.muestra}</td>
                <td>${c.cmyk}</td>
                <td>
                    <span style="color:var(--accent)">${c.ajuste}</span>
                    ${c.extra}
                </td>
            </tr>
        `).join('');
    }

    function exportarProyecto() {
        proyecto.nombre = document.getElementById('projName').value || "proyecto_sin_nombre";
        const data = JSON.stringify(proyecto);
        const blob = new Blob([data], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${proyecto.nombre}.alpha`;
        a.click();
    }

    function importarProyecto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            proyecto = JSON.parse(e.target.result);
            document.getElementById('projName').value = proyecto.nombre;
            renderTabla();
        };
        reader.readAsText(file);
    }

    function guardarBorrador() {
        proyecto.nombre = document.getElementById('projName').value;
        localStorage.setItem('alpha_draft', JSON.stringify(proyecto));
        alert("Borrador guardado en el navegador.");
    }

    window.onload = () => {
        const draft = localStorage.getItem('alpha_draft');
        if(draft) {
            proyecto = JSON.parse(draft);
            document.getElementById('projName').value = proyecto.nombre;
            renderTabla();
        }
    };
</script>
</body>
</html>
