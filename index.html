<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v1.5 - Full CMYK Intelligence</title>
    <style>
        :root {
            --bg-page: #212529;
            --bg-container: #1a1a1a;
            --color-text-main: #40e0d0;
            --color-text-body: #ced4da;
            --color-border: #343a40;
            --color-btn-coral: #ff6b81;
            --color-btn-orange: #ffb74d;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-page); color: var(--color-text-body); display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; background-color: var(--bg-container); padding: 30px; border-radius: 20px; border-top: 5px solid var(--color-text-main); text-align: center; }
        .logo-header { max-width: 90px; margin-bottom: 10px; }
        h1 { color: var(--color-text-main); letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background-color: #2a2a2a; padding: 15px; border-radius: 12px; border: 1px solid var(--color-border); text-align: left; }
        .card h3 { font-size: 0.75em; color: var(--color-text-main); border-bottom: 1px solid var(--color-border); padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        
        input { width: 90%; padding: 10px; background: #1a1a1a; border: 1px solid var(--color-border); border-radius: 5px; color: white; margin-bottom: 10px; }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-calc { flex: 2; padding: 15px; background: linear-gradient(135deg, var(--color-btn-coral), var(--color-btn-orange)); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        .btn-new { flex: 1; padding: 15px; background: #495057; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }

        .instrucciones-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .color-instruction { padding: 15px; border-radius: 12px; text-align: center; border: 2px solid transparent; background: #252525; }
        .val-ajuste { font-size: 1.8em; font-weight: bold; display: block; margin: 5px 0; }
        
        .subir-card { border-color: var(--color-btn-coral); }
        .bajar-card { border-color: #51cf66; }
        .bloqueado-card { border-color: var(--color-btn-orange); opacity: 0.9; background: #1a1a1a; }

        #resultado { display: none; margin-top: 30px; text-align: left; }
        .msg-alerta { background:#2c2c2c; border: 1px solid var(--color-btn-orange); padding:20px; border-radius:10px; margin-top:20px; line-height: 1.6; }

        .historial-header { display: flex; justify-content: space-between; align-items: center; margin-top: 50px; border-bottom: 1px solid var(--color-text-main); padding-bottom: 10px; }
        .btn-clear-hist { background: transparent; border: 1px solid #ff6b81; color: #ff6b81; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; }
        th { background: #343a40; color: var(--color-text-main); padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid var(--color-border); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <img src="Logo.png" alt="ALFA" class="logo-header">
    <h1>ALPHA</h1>
    <p style="font-size: 0.7em; opacity: 0.6;">UNIVERSAL CMYK ENGINE v1.5</p>

    <div class="card" style="margin-top:20px;">
        <h3>Identificación del Proyecto</h3>
        <input type="text" id="colorName" placeholder="Nombre del color">
    </div>

    <div class="grid-inputs">
        <div class="card">
            <h3>Objetivo (LAB)</h3>
            <input type="number" id="L1" placeholder="L*" step="0.01">
            <input type="number" id="a1" placeholder="a*" step="0.01">
            <input type="number" id="b1" placeholder="b*" step="0.01">
        </div>
        <div class="card">
            <h3>Muestra (LAB)</h3>
            <input type="number" id="L2" placeholder="L*" step="0.01">
            <input type="number" id="a2" placeholder="a*" step="0.01">
            <input type="number" id="b2" placeholder="b*" step="0.01">
        </div>
    </div>

    <div class="card">
        <h3>CMYK Actual (%)</h3>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="curC" placeholder="C">
            <input type="number" id="curM" placeholder="M">
            <input type="number" id="curY" placeholder="Y">
            <input type="number" id="curK" placeholder="K">
        </div>
    </div>

    <div class="button-group">
        <button onclick="procesarAlfa()" class="btn-calc">CALCULAR RUTA</button>
        <button onclick="nuevoCalculo()" class="btn-new">NUEVO</button>
    </div>

    <div id="resultado">
        <h2 id="resTitulo" style="color: var(--color-text-main); margin-bottom: 5px;"></h2>
        <p id="resDelta" style="margin: 0 0 20px 0; font-weight: bold;"></p>
        <div class="instrucciones-grid" id="gridCartas"></div>
        <div id="msgCompensacion"></div>
    </div>

    <div class="historial-header">
        <h3 style="color: var(--color-text-main); margin: 0;">REGISTRO</h3>
        <button onclick="borrarHistorial()" class="btn-clear-hist">LIMPIAR</button>
    </div>
    <table id="tablaHistorial">
        <thead><tr><th>Nombre</th><th>ΔE</th><th>Ajuste</th></tr></thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    window.onload = cargarHistorial;

    function nuevoCalculo() {
        ['colorName', 'L1', 'a1', 'b1', 'L2', 'a2', 'b2', 'curC', 'curM', 'curY', 'curK'].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById('resultado').style.display = 'none';
    }

    function procesarAlfa() {
        const L1 = parseFloat(document.getElementById('L1').value) || 0;
        const a1 = parseFloat(document.getElementById('a1').value) || 0;
        const b1 = parseFloat(document.getElementById('b1').value) || 0;
        const L2 = parseFloat(document.getElementById('L2').value) || 0;
        const a2 = parseFloat(document.getElementById('a2').value) || 0;
        const b2 = parseFloat(document.getElementById('b2').value) || 0;
        
        const dL = L2 - L1; 
        const da = a2 - a1;
        const db = b2 - b1;
        const dE = Math.sqrt(dL*dL + da*da + db*db).toFixed(2);

        const tintas = [
            { id: 'C', nombre: 'Cian', ajuste: (dL * 0.4).toFixed(1), actual: parseFloat(document.getElementById('curC').value) || 0 },
            { id: 'M', nombre: 'Magenta', ajuste: (da * -1.6).toFixed(1), actual: parseFloat(document.getElementById('curM').value) || 0 },
            { id: 'Y', nombre: 'Amarillo', ajuste: (db * -1.6).toFixed(1), actual: parseFloat(document.getElementById('curY').value) || 0 },
            { id: 'K', nombre: 'Negro', ajuste: (dL * 1.3).toFixed(1), actual: parseFloat(document.getElementById('curK').value) || 0 }
        ];

        let htmlCartas = "";
        let alertas = [];

        tintas.forEach(t => {
            let valorFinal = t.actual + parseFloat(t.ajuste);
            let isSaturado = valorFinal >= 100;
            let clase = isSaturado ? 'bloqueado-card' : (t.ajuste > 0 ? 'subir-card' : 'bajar-card');
            let textoAjuste = isSaturado ? "MAX" : (t.ajuste > 0 ? "+" + t.ajuste : t.ajuste) + "%";

            // MOTOR DE DECISIÓN CRÍTICA UNIVERSAL
            if (isSaturado) {
                if (t.id === 'K' && dL > 0) {
                    alertas.push(`<strong>NEGRO (K) AL 100%:</strong> La muestra sigue clara. Para ganar profundidad, sube <strong>C: +1.5%, M: +1.5%, Y: +1.5%</strong>.`);
                }
                if (t.id === 'M' && da < 0) {
                    if (db < 0) {
                        alertas.push(`<strong>MAGENTA (M) AL 100%:</strong> Tono azulado. Baja <strong>Cian: -2.5%</strong> y sube <strong>Negro: +1.0%</strong>.`);
                    } else {
                        alertas.push(`<strong>MAGENTA (M) AL 100%:</strong> Tono sucio. Baja <strong>Amarillo: -2.0%</strong> y <strong>Cian: -1.0%</strong>.`);
                    }
                }
                if (t.id === 'C' && dL < 0) {
                    alertas.push(`<strong>CIAN (C) AL 100%:</strong> Color muy oscuro/frío. Baja <strong>Magenta: -2.0%</strong> y <strong>Amarillo: -1.5%</strong>.`);
                }
                if (t.id === 'Y' && db < 0) {
                    alertas.push(`<strong>AMARILLO (Y) AL 100%:</strong> Falta calidez. Baja <strong>Cian: -2.0%</strong> para dejar que el amarillo resalte.`);
                }
            }

            htmlCartas += `<div class="color-instruction ${clase}"><span style="font-size:0.7em">${t.nombre}</span><span class="val-ajuste">${textoAjuste}</span><small>${isSaturado ? 'LÍMITE' : (t.ajuste > 0 ? 'SUBIR' : 'BAJAR')}</small></div>`;
        });

        document.getElementById('resTitulo').innerText = document.getElementById('colorName').value || "Muestra";
        document.getElementById('resDelta').innerText = `ΔE: ${dE}`;
        document.getElementById('gridCartas').innerHTML = htmlCartas;
        document.getElementById('msgCompensacion').innerHTML = alertas.length > 0 ? `<div class="msg-alerta">${alertas.join('<br><br>')}</div>` : "";
        document.getElementById('resultado').style.display = 'block';

        guardarEnHistorial(document.getElementById('colorName').value || "S/N", dE, tintas.map(t => `${t.id}:${t.ajuste}`).join(' '));
    }

    function guardarEnHistorial(nombre, de, ajuste) {
        let history = JSON.parse(localStorage.getItem('alfa_v15_hist')) || [];
        history.unshift({ nombre, de, ajuste });
        localStorage.setItem('alfa_v15_hist', JSON.stringify(history.slice(0, 10)));
        cargarHistorial();
    }

    function cargarHistorial() {
        let history = JSON.parse(localStorage.getItem('alfa_v15_hist')) || [];
        document.getElementById('cuerpoTabla').innerHTML = history.map(h => `<tr><td>${h.nombre}</td><td>${h.de}</td><td>${h.ajuste}</td></tr>`).join('');
    }

    function borrarHistorial() {
        if(confirm("¿Borrar historial?")) { localStorage.removeItem('alfa_v15_hist'); cargarHistorial(); }
    }
</script>
</body>
</html>
