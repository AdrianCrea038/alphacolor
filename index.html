<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA v2.8.1 - Fix & Quadrant</title>
    <style>
        :root {
            --bg-page: #0f111a;
            --bg-card: #1a1d29;
            --accent: #40e0d0;
            --coral: #ff6b81;
            --orange: #ffb74d;
            --text: #ced4da;
            --success: #51cf66;
            --blue: #4dabf7;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 20px; }
        
        .project-config { background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #343a40; display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px; }
        .input-group label { display: block; font-size: 0.65em; letter-spacing: 1px; margin-bottom: 5px; color: var(--accent); text-transform: uppercase; }
        
        .grid-main { display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #343a40; }
        .card h3 { color: var(--accent); font-size: 0.8em; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #343a40; padding-bottom: 5px; margin-bottom: 10px; }
        
        input { width: 100%; background: #0f111a; border: 1px solid #343a40; color: white; padding: 10px; border-radius: 5px; margin-bottom: 8px; box-sizing: border-box; }
        
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7em; }
        .btn-main { background: linear-gradient(135deg, var(--coral), var(--orange)); color: #000; width: 100%; font-size: 1.1em; margin-top: 10px; padding: 12px; }
        .btn-sec { background: #343a40; color: white; border: 1px solid #495057; }
        .btn-danger { background: transparent; color: var(--coral); border: 1px solid var(--coral); }
        
        .table-container { background: var(--bg-card); border-radius: 12px; overflow: hidden; margin-top: 30px; border: 1px solid #343a40; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        th { background: #252a3d; color: var(--accent); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #343a40; vertical-align: top; }
        
        .badge-de { background: #000; padding: 4px 8px; border-radius: 6px; font-weight: bold; border: 1px solid #333; }
        
        .ruta-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #444; }
        .cuadrante-info { color: var(--blue); font-size: 0.85em; font-weight: bold; margin-bottom: 8px; display: block; border-bottom: 1px solid #333; padding-bottom: 4px; }
        
        /* Check Point Mejorado */
        .check-point { 
            display: block; padding: 8px; border-radius: 6px; margin-bottom: 5px; 
            border: 1px solid #444; cursor: pointer; transition: 0.2s; background: #1a1d29;
        }
        .check-point:hover { border-color: var(--accent); background: #252a3d; }
        .check-point.selected { 
            border-color: var(--success); background: rgba(81, 207, 102, 0.1); color: var(--success);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ALPHA <span style="font-weight: 200; font-size: 0.5em;">v2.8.1 Fix Loader</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sec" onclick="exportarProyecto()">Exportar .alpha</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarProyecto(event)">
            <button class="btn btn-sec" onclick="document.getElementById('fileInput').click()">Cargar Proyecto</button>
        </div>
    </div>

    <div class="project-config">
        <div class="input-group">
            <label>Nombre del Proyecto</label>
            <input type="text" id="projName" placeholder="Identificación...">
        </div>
        <div class="input-group">
            <label>Blanco de Tela (LAB)</label>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="clothL" placeholder="L">
                <input type="number" id="clothA" placeholder="a">
                <input type="number" id="clothB" placeholder="b">
            </div>
        </div>
    </div>

    <div class="grid-main">
        <div class="card">
            <h3>1. Referencia (Objetivo)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="rL" placeholder="L" step="0.01">
                <input type="number" id="ra" placeholder="a" step="0.01">
                <input type="number" id="rb" placeholder="b" step="0.01">
            </div>
        </div>
        <div class="card">
            <h3>2. Muestra (Actual)</h3>
            <input type="text" id="mName" placeholder="ID Muestra">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="mL" placeholder="L" step="0.01">
                <input type="number" id="ma" placeholder="a" step="0.01">
                <input type="number" id="mb" placeholder="b" step="0.01">
            </div>
        </div>
        <div class="card">
            <h3>3. CMYK (%)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="number" id="cC" placeholder="C">
                <input type="number" id="cM" placeholder="M">
                <input type="number" id="cY" placeholder="Y">
                <input type="number" id="cK" placeholder="K">
            </div>
            <button class="btn btn-main" onclick="procesar()">CALCULAR RUTA</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Color</th>
                    <th>ΔE</th>
                    <th>Cuadrante / Análisis</th>
                    <th>Ajuste / Check Point</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let proyecto = { nombre: "", tela: {L:0, a:0, b:0}, colores: [] };

    function procesar() {
        const rL = parseFloat(document.getElementById('rL').value);
        const ra = parseFloat(document.getElementById('ra').value);
        const rb = parseFloat(document.getElementById('rb').value);
        const mL = parseFloat(document.getElementById('mL').value);
        const ma = parseFloat(document.getElementById('ma').value);
        const mb = parseFloat(document.getElementById('mb').value);
        
        if (isNaN(rL) || isNaN(mL)) return alert("Faltan datos LAB");

        const dL = mL - rL;
        const da = ma - ra;
        const db = mb - rb;
        const dE = Math.sqrt(dL*dL + da*da + db*db).toFixed(2);

        // ANALISIS DE CUADRANTE PARA DECISION
        let cuadranteMsg = "";
        if (da > 0.4) cuadranteMsg += "Sobra Rojo (+a). ";
        if (da < -0.4) cuadranteMsg += "Sobra Verde (-a). ";
        if (db > 0.4) cuadranteMsg += "Sobra Amarillo (+b). ";
        if (db < -0.4) cuadranteMsg += "Sobra Azul (-b). ";
        if (cuadranteMsg === "") cuadranteMsg = "Neutral / En Tolerancia";

        const curC = parseFloat(document.getElementById('cC').value) || 0;
        const curM = parseFloat(document.getElementById('cM').value) || 0;
        const curY = parseFloat(document.getElementById('cY').value) || 0;
        const curK = parseFloat(document.getElementById('cK').value) || 0;

        // Generar Rutas Dinámicas
        let rutas = [];
        if (curK >= 98 || curY >= 98 || curM >= 98 || curC >= 98) {
            if (curY >= 98) {
                rutas = [
                    { t: "Ruta A: Subir M +1.5% (Si el cuadrante indica Sobra Verde)", id: 0 },
                    { t: "Ruta B: Subir K +0.8% (Para oscurecer sin amarillear)", id: 1 }
                ];
            } else if (curK >= 98) {
                rutas = [
                    { t: "Ruta A: CMY +1.2% parejo (Profundidad)", id: 0 },
                    { t: "Ruta B: C +1.5% y M +1.0% (Si el cuadrante es Cálido)", id: 1 }
                ];
            } else {
                rutas = [{ t: "Compensación Manual sugerida", id: 0 }];
            }
        }

        const nuevo = {
            id: Date.now(),
            nombre: document.getElementById('mName').value || "Color",
            de: dE,
            cuadrante: cuadranteMsg,
            cmyk: `C:${curC} M:${curM} Y:${curY} K:${curK}`,
            rutas: rutas,
            rutaElegida: null
        };

        proyecto.colores.unshift(nuevo);
        render();
        limpiar();
    }

    function marcarCheckPoint(colorId, rutaId) {
        const col = proyecto.colores.find(c => c.id === colorId);
        col.rutaElegida = rutaId;
        render();
    }

    function render() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = proyecto.colores.map(c => `
            <tr>
                <td><small>${new Date(c.id).toLocaleTimeString()}</small></td>
                <td><strong>${c.nombre}</strong><br><small>${c.cmyk || ''}</small></td>
                <td><span class="badge-de" style="color:${c.de > 2 ? 'var(--coral)' : 'var(--success)'}">${c.de}</span></td>
                <td><span class="cuadrante-info">${c.cuadrante || 'Análisis no disponible'}</span></td>
                <td>
                    <div class="ruta-box">
                        ${c.rutas && c.rutas.length > 0 ? 
                            c.rutas.map(r => `
                                <div class="check-point ${c.rutaElegida === r.id ? 'selected' : ''}" 
                                     onclick="marcarCheckPoint(${c.id}, ${r.id})">
                                    ${c.rutaElegida === r.id ? '✓ ' : ''}${r.t}
                                </div>
                            `).join('') : 
                            '<span style="color:var(--success)">Sin colisión de canal</span>'
                        }
                    </div>
                </td>
                <td><button class="btn btn-danger" onclick="eliminar(${c.id})">✕</button></td>
            </tr>
        `).join('');
    }

    function eliminar(id) {
        proyecto.colores = proyecto.colores.filter(c => c.id !== id);
        render();
    }

    function limpiar() {
        ['mName','mL','ma','mb','cC','cM','cY','cK'].forEach(id => document.getElementById(id).value = "");
    }

    function exportarProyecto() {
        proyecto.nombre = document.getElementById('projName').value || "Alpha_Export";
        const blob = new Blob([JSON.stringify(proyecto)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = proyecto.nombre + ".alpha";
        a.click();
    }

    // CARGA CORREGIDA: Ahora maneja archivos de versiones anteriores
    function importarProyecto(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                // Migración de datos viejos a v2.8
                proyecto.nombre = data.nombre || "Proyecto Importado";
                proyecto.colores = (data.colores || []).map(c => ({
                    ...c,
                    rutas: c.rutas || [],
                    cuadrante: c.cuadrante || "Historial antiguo"
                }));
                document.getElementById('projName').value = proyecto.nombre;
                render();
            } catch(err) {
                alert("Error: El archivo no es compatible o está dañado.");
                console.error(err);
            }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
